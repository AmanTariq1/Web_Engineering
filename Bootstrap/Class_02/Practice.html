<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootsrap Class_02_Practice_layout</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="main-container" style="margin: 20px auto; padding: 0 20px;">
      <div class="row">
        <div class="col-12 ">
          <div
            class="logo"
            style="background: #6c757d;padding: 20px;text-align: center;font-weight: bold;margin-bottom: 10px;border-radius: 5px;color: white;">
            Logo
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
<div class="navigation" style="background: #6c757d; padding: 20px; text-align: center; font-weight: bold; margin-bottom: 10px; border-radius: 5px; color: white; ">
            Navigation
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div
            class="header-banner"
            style="background: #6c757d;padding: 20px;text-align: center;font-weight: bold;margin-bottom: 10px;border-radius: 5px; color: white;">
            Header / Banner
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-3 ">
          <div
            class="sidebar"
            style=" background: #6c757d; min-height: 300px; padding: 20px;text-align: center;font-weight: bold; margin-bottom: 10px;border-radius: 5px;color: white;">
            Side Bar
          </div>
        </div>
        <div class="col-md-9 ">
          <div
            class="body-area"
            style="background: #6c757d;min-height: 300px;padding: 20px;text-align: center;font-weight: bold;margin-bottom: 10px;border-radius: 5px;color: white;">
            Body Area
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div
            class="footer"style=" background: #6c757d;margin-bottom: 0;padding: 20px; text-align: center; font-weight: bold; margin-bottom: 10px; border-radius: 5px; color: white;">
            Footer
          </div>
        </div>
      </div>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</html>
